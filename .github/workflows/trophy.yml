name: trophy
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}
jobs:
  trophy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - run: npx --yes github-profile-trophy --username prathmesh0work --output trophy.svg
      - run: |
          git add -A .
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "Update trophy" || echo "No changes"
          git push
